# nncp-gen example config
# Demonstrates both role-based and node-based NNCP generation.

defaults:
  mtu: 9000
  bridge_type: ovs-bridge    # ovs-bridge | linux-bridge
  stp: false
  bond_mode: 802.3ad
  lacp_rate: fast

# --- Roles: label-based node selection ---
# Use roles when the same network config applies to all nodes with a given role.
# One NNCP is generated per role (not per node).
roles:
  worker:
    node_selector:
      node-role.kubernetes.io/worker: ""

  master:
    node_selector:
      node-role.kubernetes.io/master: ""

  # Multiple labels narrow the selector
  infra:
    node_selector:
      node-role.kubernetes.io/infra: ""
      cluster.example.com/zone: dmz

# --- Nodes: hostname-based node selection ---
# Use nodes when you need per-node IPs or unique config per host.
# One NNCP is generated per node per network.
nodes:
  wrkr01:
    hostname: wrkr01.ovelab.acanorex.io
  wrkr02:
    hostname: wrkr02.ovelab.acanorex.io
  wrkr03:
    hostname: wrkr03.ovelab.acanorex.io

networks:
  # ===========================================================================
  # ROLE-BASED EXAMPLES
  # These generate ONE NNCP that targets all nodes matching the role's labels.
  # No per-node IPs — use for VM traffic bridges, overlay networks, etc.
  # ===========================================================================

  # OVS bridge for VM access — applies to all workers
  vma:
    role: worker
    bridge: br-vma
    nic: ens2f1
    vlan: 54
    allow_extra_patch_ports: true
    ovn_mapping: vm-access-br

  # OVS bridge with bond — applies to all workers
  tenant:
    role: worker
    bridge: br-tenant
    bond:
      name: bond1
      members: [ens3f0, ens3f1]
      mode: 802.3ad
    vlan: 200
    allow_extra_patch_ports: true
    ovn_mapping: tenant-net

  # Linux bridge on infra nodes
  monitoring:
    role: infra
    bridge: br-mon
    bridge_type: linux-bridge
    nic: ens4f0

  # ===========================================================================
  # EXTRA PORTS EXAMPLES
  # Add additional ports to a bridge — plain NICs or OVS interfaces.
  # OVS interfaces (type: ovs-interface) generate both the interface
  # definition and the bridge port entry.
  # ===========================================================================

  # OVS bridge with extra NIC port and an OVS interface with IP + VLAN
  vm-storage:
    role: worker
    bridge: br-vm-stor
    nic: ens5f0
    allow_extra_patch_ports: true
    ovn_mapping: vm-storage-br
    extra_ports:
      - name: ens5f1                    # additional NIC port (no config needed)
      - name: ovs-stor0                 # OVS internal interface with IP and VLAN
        type: ovs-interface
        mtu: 9000
        ipv4: 172.25.55.1/24
        vlan:
          mode: access
          tag: 55

  # OVS bridge with an OVS interface without IP (internal port, no address)
  internal:
    role: worker
    bridge: br-internal
    nic: ens6f0
    extra_ports:
      - name: ovs-int0                  # OVS interface, no IP
        type: ovs-interface

  # OVS bridge with per-node IPs on an extra OVS interface (node-based)
  vm-storage-pn:
    bridge: br-vm-stor-pn
    nic: ens7f0
    allow_extra_patch_ports: true
    extra_ports:
      - name: ovs-pn0
        type: ovs-interface
        vlan:
          mode: access
          tag: 60
        addresses:                       # per-node IPs on the extra port
          wrkr01: 172.25.60.23/24
          wrkr02: 172.25.60.24/24
          wrkr03: 172.25.60.25/24

  # ===========================================================================
  # NODE-BASED EXAMPLES
  # These generate one NNCP per node with per-node static IPs.
  # Use for storage, management, or any network needing unique addresses.
  # ===========================================================================

  # OVS bridge with per-node IPs
  storage:
    bridge: br-storage
    bridge_type: ovs-bridge
    nic: ens1f0
    vlan: 100
    addresses:
      wrkr01: 172.25.100.23/24
      wrkr02: 172.25.100.24/24
      wrkr03: 172.25.100.25/24

  # Linux bridge with per-node IPs
  mgmt:
    bridge: br-mgmt
    bridge_type: linux-bridge
    nic: ens1f0
    addresses:
      wrkr01: 10.0.1.11/24
      wrkr02: 10.0.1.12/24
      wrkr03: 10.0.1.13/24
